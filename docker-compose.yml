version: "3.9"

services:
  # ==================== 后端 API 服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: aigc_api
    ports:
      - "8000:8000"
    environment:
      # 应用配置
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000

      # MySQL 配置
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=aigc_video
      - MYSQL_USER=aigc_user
      - MYSQL_PASSWORD=123456
      - MYSQL_ROOT_PASSWORD=root_password

      # MinIO 配置
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=aigc-videos
      - MINIO_SECURE=false

      # ChromaDB 配置
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMADB_COLLECTION=video_knowledge

      # Milvus 配置
      - VECTOR_DB_TYPE=chromadb  # 默认使用ChromaDB，如需切换到Milvus改为milvus或qdrant
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_USERNAME=
      - MILVUS_PASSWORD=
      - MILVUS_PRODUCT_COLLECTION=product_knowledge
      - MILVUS_SLICE_COLLECTION=slice_knowledge
      - MILVUS_VIDEO_COLLECTION=video_knowledge
      - MILVUS_IMG_COLLECTION=img_knowledge
      - MILVUS_AUDIO_COLLECTION=audio_knowledge
      - MILVUS_VECTOR_DIMENSION=1536

      # Qdrant 配置
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - QDRANT_API_KEY=123456
      - QDRANT_PREFER_GRPC=true
      - QDRANT_PRODUCT_COLLECTION=product_knowledge
      - QDRANT_SLICE_COLLECTION=slice_knowledge
      - QDRANT_VIDEO_COLLECTION=video_knowledge
      - QDRANT_IMAGE_COLLECTION=img_knowledge
      - QDRANT_AUDIO_COLLECTION=audio_knowledge
      - QDRANT_VECTOR_DIMENSION=1536

      # LLM API Keys (从 .env 文件加载或手动设置)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}


    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./app:/app/app:ro
      - ./logs:/app/logs
      - video_temp:/app/temp
    networks:
      - aigc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0.42
    container_name: aigc_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=aigc_video
      - MYSQL_USER=aigc_user
      - MYSQL_PASSWORD=123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - aigc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ==================== MinIO (对象存储) ====================
  minio:
    image: minio/minio:latest
    container_name: aigc_minio
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台端口
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - aigc_network
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== ChromaDB (向量数据库) ====================
  chromadb:
    image: chromadb/chroma:1.0.5
    container_name: aigc_chromadb
    ports:
      - "8001:8000"   # 映射到宿主机 8001，避免与 API 冲突
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - aigc_network
    restart: unless-stopped

  # ==================== Milvus (向量数据库) ====================
  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: aigc_milvus
    ports:
      - "19530:19530"  # gRPC 端口
      - "9091:9091"    # HTTP 端口
    environment:
      - ETCD_USE_EMBED=true
      - ETCD_DATA_DIR=/var/lib/milvus/etcd
      - ETCD_CONFIG_PATH=/milvus/configs/embedEtcd.yaml
      - COMMON_STORAGETYPE=local
      - COMMON_SECURITY_AUTHORIZATIONENABLED=false  # 默认关闭认证，如需开启可设置为true
      - COMMON_LOG_LEVEL=info
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - aigc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s  # Milvus 启动较慢，给予足够的启动时间

  # ==================== Qdrant (向量数据库) ====================
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: aigc_qdrant
    ports:
      - "6333:6333"  # HTTP 端口
      - "6334:6334"  # gRPC 端口
    environment:
      - QDRANT__SERVICE__API_KEY=123456 # 可选API密钥，从.env加载
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aigc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== Redis ====================
  redis:
    image: redis:7.4.3-alpine
    container_name: aigc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aigc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== Celery Worker (异步任务) ====================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: aigc_celery
    command: celery -A backend.v1.app.generate.tasks.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-6}
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MYSQL_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
      - CHROMADB_HOST=chromadb
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FRAME_VIDEO_WAIT_TIMEOUT_SECONDS=${FRAME_VIDEO_WAIT_TIMEOUT_SECONDS:-1800}
      - FRAME_VIDEO_POLL_INTERVAL_SECONDS=${FRAME_VIDEO_POLL_INTERVAL_SECONDS:-5}
    env_file:
      - .env
    depends_on:
      - redis
      - mysql
      - minio
    volumes:
      - ./app:/app/app:ro
      - video_temp:/app/temp
    networks:
      - aigc_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # 如需 GPU 加速视频生成

  # ==================== Flower (Celery 监控) ====================
  flower:
    image: mher/flower:2.0
    container_name: aigc_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
      - celery_worker
    networks:
      - aigc_network
    restart: unless-stopped

  # ==================== Nginx (反向代理) ====================
  nginx:
    image: nginx:1.27.5-alpine
    container_name: aigc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - aigc_network
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
  chroma_data:
  redis_data:
  video_temp:
  milvus_data:
  qdrant_data:

networks:
  aigc_network:
    driver: bridge
